services:
  app:
    build: .
    restart: always
    expose:
      - "8000"
    environment:
      - AVALUOS_TEMPLATE_PATH=/app/Grupo Ovando.xlsx

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
