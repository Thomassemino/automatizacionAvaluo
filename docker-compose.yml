services:
  app:
    build: .
    restart: always
    expose:
      - "8000"
    environment:
      - AVALUOS_TEMPLATE_PATH=/app/Grupo Ovando.xlsx

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${LOCAL_HTTP_PORT:-8083}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_network}"
      - "traefik.http.routers.avaluos.rule=Host(`${TRAEFIK_HOST:-anepsa.lambdacodestudio.com.ar}`)"
      - "traefik.http.routers.avaluos-http.rule=Host(`${TRAEFIK_HOST:-anepsa.lambdacodestudio.com.ar}`)"
      - "traefik.http.routers.avaluos-http.entrypoints=web"
      - "traefik.http.routers.avaluos.entrypoints=websecure"
      - "traefik.http.routers.avaluos.tls=true"
      - "traefik.http.services.avaluos.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_network}
